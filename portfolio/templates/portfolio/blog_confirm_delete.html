{% extends 'portfolio/base.html' %}

{% block title %}Delete Post: {{ post.title }}{% endblock %}

{% block content %}
<div class="confirm-box">
    <h2>Confirm Delete</h2>
    <p>Are you sure you want to permanently delete the blog post "<strong>{{ post.title }}</strong>"? This action cannot be undone.</p>
    
    <form method="POST">
        {% csrf_token %}
        <a href="{% url 'blog_detail' slug=post.slug %}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-danger">Confirm Delete</button>
    </form>
</div>
{% endblock %}
