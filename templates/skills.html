{% extends 'base.html' %}

{% block content %}
<section class="page-header">
    <h1>My Skills</h1>
    <p>Technologies and tools I work with regularly.</p>
</section>

<div class="skills-grid">
    {% for skill in skills %}
        <div class="skill-card">
            <div class="skill-card-top">
                <strong>{{ skill.name }}</strong>
                <span>{{ skill.proficiency }}%</span>
            </div>
            <div class="skill-bar">
                <div class="skill-fill" style="width: {{ skill.proficiency }}%;"></div>
            </div>
        </div>
        <div class="skill-card">
    <div class="skill-card-top">
        <span>
            {% if skill.icon %}<i class="{{ skill.icon }} skill-icon"></i>{% endif %}
            <strong>{{ skill.name }}</strong>
        </span>
        <span>{{ skill.proficiency }}%</span>
    </div>
    <div class="skill-bar">
        <div class="skill-fill" style="width: {{ skill.proficiency }}%;"></div>
    </div>
</div>
    {% endfor %}
</div>
{% endblock %}
