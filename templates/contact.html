{% extends 'base.html' %}

{% block content %}
<section class="form-page">
    <h1>Contact Me</h1>
    <p>Have a question or just want to say hi? Fill out the form below.</p>

    {% if submitted %}
        <p class="success-message">✅ Thanks! Your message has been sent.</p>
    {% endif %}

    <form method="post" class="styled-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Send Message</button>
    </form>
</section>
{% endblock %}
